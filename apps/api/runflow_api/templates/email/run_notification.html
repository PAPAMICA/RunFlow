<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background:#0f1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0f1117;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#181b24;border:1px solid #2a3142;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:28px 32px 20px;border-bottom:1px solid #2a3142;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                <tr>
                  <td>
                    <p style="margin:0 0 6px;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#8b95a8;">RunFlow</p>
                    <h1 style="margin:0;font-size:22px;line-height:1.3;color:#f4f6fb;">{{ title }}</h1>
                  </td>
                  <td align="right" valign="top">
                    <span style="display:inline-block;padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;color:{{ status_color }};background:{{ status_bg }};border:1px solid {{ status_border }};">
                      {{ status_label }}
                    </span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:24px 32px;">
              <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#c5ccda;">{{ message }}</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#12151c;border:1px solid #2a3142;border-radius:12px;">
                {% for row in details %}
                <tr>
                  <td style="padding:12px 16px;border-bottom:1px solid #232936;font-size:13px;color:#8b95a8;width:38%;">{{ row.label }}</td>
                  <td style="padding:12px 16px;border-bottom:1px solid #232936;font-size:13px;color:#e8ecf4;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;word-break:break-all;">{{ row.value }}</td>
                </tr>
                {% endfor %}
              </table>
              {% if error %}
              <div style="margin-top:16px;padding:14px 16px;border-radius:10px;background:#2a1518;border:1px solid #5c2b33;">
                <p style="margin:0 0 6px;font-size:12px;font-weight:700;color:#f87171;">Erreur</p>
                <p style="margin:0;font-size:13px;line-height:1.5;color:#fecaca;white-space:pre-wrap;">{{ error }}</p>
              </div>
              {% endif %}
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px;">
              <a href="{{ run_url }}" style="display:inline-block;padding:12px 20px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;">
                Voir l'exécution
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 24px;border-top:1px solid #2a3142;">
              <p style="margin:0;font-size:12px;line-height:1.5;color:#6b7280;">
                Notification automatique pour le job <strong style="color:#9ca3af;">{{ job_name }}</strong>.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
