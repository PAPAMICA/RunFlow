[project]
name = "runflow-shared"
version = "0.1.0"
description = "Shared types and enums for RunFlow"
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["runflow_shared"]
