# Déploiement RunFlow — stack serveur (API + Web + Postgres + Valkey)
#
# Prérequis :
#   - Réseau Docker externe Traefik : docker network create proxy
#   - DNS pointant vers le serveur (RUNFLOW_WEB_HOST, RUNFLOW_API_HOST)
#
# Usage (depuis la racine du dépôt) :
#   cp deploy/.env.server.example .env
#   ./deploy/deploy-server.sh
#
# Ou manuellement :
#   docker compose --project-directory . -f deploy/docker-compose.server.yml up -d --build

services:
  postgres:
    image: postgres:17-alpine
    container_name: runflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-runflow}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: runflow_valkey
    networks:
      - internal
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: runflow/api:0.1.0
    container_name: runflow_api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-runflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-runflow}
      VALKEY_URL: redis://valkey:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      RUNFLOW_MASTER_KEY: ${RUNFLOW_MASTER_KEY:?RUNFLOW_MASTER_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      RUNFLOW_WEB_HOST: ${RUNFLOW_WEB_HOST:-}
      DATA_DIR: /data
      JOBS_DIR: /data/jobs
      RUNS_DIR: /data/runs
    volumes:
      - ./data/runflow:/data
    networks:
      - internal
      - proxy
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.runflow_api-secure.rule=Host(`${RUNFLOW_API_HOST:?RUNFLOW_API_HOST is required}`)"
      - "traefik.http.routers.runflow_api-secure.tls=true"
      - "traefik.http.routers.runflow_api-secure.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-http}"
      - "traefik.http.services.runflow_api.loadbalancer.server.port=8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    image: runflow/web:0.1.0
    container_name: runflow_web
    networks:
      - internal
      - proxy
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.runflow_web-secure.rule=Host(`${RUNFLOW_WEB_HOST:?RUNFLOW_WEB_HOST is required}`)"
      - "traefik.http.routers.runflow_web-secure.tls=true"
      - "traefik.http.routers.runflow_web-secure.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-http}"
      - "traefik.http.services.runflow_web.loadbalancer.server.port=3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: runflow/worker:0.1.0
    container_name: runflow_worker_${WORKER_NAME:-server}
    environment:
      RUNFLOW_API_URL: http://api:8000
      RUNFLOW_WORKER_TOKEN: ${RUNFLOW_WORKER_TOKEN:-}
      DOCKER_ENABLED: "true"
      PYTHON_RUNNER_IMAGE: ${PYTHON_RUNNER_IMAGE:-runflow/runner-python:0.1.0}
      BASH_RUNNER_IMAGE: ${BASH_RUNNER_IMAGE:-runflow/runner-bash:0.1.0}
      ANSIBLE_RUNNER_IMAGE: ${ANSIBLE_RUNNER_IMAGE:-runflow/runner-ansible:0.1.0}
    env_file:
      - path: ./data/worker-${WORKER_NAME:-server}/worker.env
        required: false
    volumes:
      - ./data/worker-${WORKER_NAME:-server}:/worker-data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
