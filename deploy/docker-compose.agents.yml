# RunFlow — agents d'exécution (workers distants)
#
# Usage (depuis la racine du dépôt) :
#   cp deploy/.env.agents.example .env
#   ./deploy/build-runners.sh
#   docker compose --project-directory . -f deploy/docker-compose.agents.yml up -d worker

services:
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: runflow/worker:0.1.0
    container_name: runflow_worker_${WORKER_NAME:-agent1}
    environment:
      RUNFLOW_API_URL: ${RUNFLOW_API_URL:?RUNFLOW_API_URL is required}
      DOCKER_ENABLED: "true"
      PYTHON_RUNNER_IMAGE: ${PYTHON_RUNNER_IMAGE:-runflow/runner-python:0.1.0}
      BASH_RUNNER_IMAGE: ${BASH_RUNNER_IMAGE:-runflow/runner-bash:0.1.0}
      ANSIBLE_RUNNER_IMAGE: ${ANSIBLE_RUNNER_IMAGE:-runflow/runner-ansible:0.1.0}
    env_file:
      - path: ./data/worker-${WORKER_NAME:-agent1}/worker.env
        required: false
    volumes:
      - ./data/worker-${WORKER_NAME:-agent1}:/worker-data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  register:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: runflow/worker:0.1.0
    profiles:
      - register
    environment:
      RUNFLOW_API_URL: ${RUNFLOW_API_URL:?RUNFLOW_API_URL is required}
    volumes:
      - ./data/worker-${WORKER_NAME:-agent1}:/worker-data
    entrypoint:
      - runflow-worker
      - register
      - --server
      - ${RUNFLOW_API_URL}
      - --registration-token
      - ${REGISTRATION_TOKEN:?REGISTRATION_TOKEN is required for register profile}
      - --name
      - ${WORKER_NAME:-agent1}
      - --env-file
      - /worker-data/worker.env
